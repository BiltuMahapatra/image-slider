<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>image slider</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="imagecontainer">
        <img src="https://picsum.photos/id/300/700/500" alt="Image" />
        <img src="https://picsum.photos/id/238/700/500" alt="Image" />
        <img src="https://picsum.photos/id/239/700/500" alt="Image" />
        <img src="https://picsum.photos/id/230/700/500" alt="Image" />
        <img src="https://picsum.photos/id/232/700/500" alt="Image" />
      </div>
      <i class="fa-solid fa-backward btn prev"></i>
      <i class="fa-solid fa-forward btn forw"></i>
    </div>
    <script src="script.js"></script>
  </body>
</html>
